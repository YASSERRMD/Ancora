extends:
  - "@commitlint/config-conventional"

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - refactor
      - test
      - docs
      - chore
      - build
      - ci
      - perf
      - style
  subject-case:
    - 2
    - always
    - lower-case
  subject-full-stop:
    - 2
    - never
    - "."
  header-max-length:
    - 2
    - always
    - 72
