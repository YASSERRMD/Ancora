site_name: Ancora
site_description: Local-first, privacy-respecting multi-agent runtime
site_author: YASSERRMD
repo_url: https://github.com/YASSERRMD/Ancora
repo_name: YASSERRMD/Ancora
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

