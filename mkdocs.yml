site_name: Ancora
site_description: Local-first, privacy-respecting multi-agent runtime
site_author: YASSERRMD
repo_url: https://github.com/YASSERRMD/Ancora
repo_name: YASSERRMD/Ancora
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Concepts:
      - What is Ancora: concepts/what-is-ancora.md
      - Architecture: concepts/architecture.md
      - Agents: concepts/agents.md
      - Tools and Effects: concepts/tools-and-effects.md
      - Orchestration Graph: concepts/orchestration-graph.md
      - Memory Tiers: concepts/memory-tiers.md
      - Durability and Replay: concepts/durability-and-replay.md
      - Determinism: concepts/determinism.md
      - Human-in-the-Loop: concepts/human-in-the-loop.md
      - Observability and OTEL: concepts/observability-and-otel.md
      - Providers and Local-First: concepts/providers-and-local-first.md
      - Vector Stores: concepts/vector-stores.md
      - Policy and Data Sovereignty: concepts/policy-and-data-sovereignty.md
      - MCP and A2A Interop: concepts/mcp-and-a2a.md
      - Deployment Models: concepts/deployment-models.md
      - Glossary: concepts/glossary.md
  - Language SDKs:
      - Go:
          - Overview: sdk/go/index.md
          - Install: sdk/go/install.md
          - Quickstart: sdk/go/quickstart.md
          - Tools: sdk/go/tools.md
          - Structured Output: sdk/go/structured-output.md
          - Multi-Agent: sdk/go/multi-agent.md
          - Verifier: sdk/go/verifier.md
          - Human-in-the-Loop: sdk/go/human-in-the-loop.md
          - Streaming: sdk/go/streaming.md
          - Memory and RAG: sdk/go/memory-and-rag.md
          - Providers: sdk/go/providers.md
          - Chinese Providers: sdk/go/chinese-providers.md
          - Vector Stores: sdk/go/vector-stores.md
          - Durability: sdk/go/durability.md
          - Observability: sdk/go/observability.md
          - Policy: sdk/go/policy.md
          - MCP and A2A: sdk/go/mcp-and-a2a.md
          - Edge Deployment: sdk/go/edge-deployment.md
          - Testing: sdk/go/testing.md
          - Troubleshooting: sdk/go/troubleshooting.md
          - API Reference: sdk/go/api-reference.md
      - Python:
          - Overview: sdk/python/index.md
          - Install: sdk/python/install.md
          - Quickstart: sdk/python/quickstart.md
          - Tools: sdk/python/tools.md
          - Structured Output: sdk/python/structured-output.md
          - Multi-Agent: sdk/python/multi-agent.md
          - Verifier: sdk/python/verifier.md
          - Human-in-the-Loop: sdk/python/human-in-the-loop.md
          - Streaming: sdk/python/streaming.md
          - Memory and RAG: sdk/python/memory-and-rag.md
          - Providers: sdk/python/providers.md
          - Chinese Providers: sdk/python/chinese-providers.md
          - Vector Stores: sdk/python/vector-stores.md
          - Durability: sdk/python/durability.md
          - Observability: sdk/python/observability.md
          - Policy: sdk/python/policy.md
          - MCP and A2A: sdk/python/mcp-and-a2a.md
          - Packaging and Deployment: sdk/python/deployment.md
          - Testing: sdk/python/testing.md
          - Troubleshooting: sdk/python/troubleshooting.md
          - API Reference: sdk/python/api-reference.md
          - Migration: sdk/python/migration.md
      - TypeScript: sdk/ts/index.md
      - .NET: sdk/dotnet/index.md
      - Java: sdk/java/index.md
      - Rust: sdk/rust/index.md
  - Quickstarts: quickstarts/index.md
  - Guides: guides/index.md
  - Contributing: CONTRIBUTING.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
