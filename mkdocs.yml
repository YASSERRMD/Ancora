site_name: Ancora
site_description: Local-first, privacy-respecting multi-agent runtime
site_author: YASSERRMD
repo_url: https://github.com/YASSERRMD/Ancora
repo_name: YASSERRMD/Ancora
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Concepts:
      - What is Ancora: concepts/what-is-ancora.md
      - Architecture: concepts/architecture.md
      - Agents: concepts/agents.md
      - Tools and Effects: concepts/tools-and-effects.md
      - Orchestration Graph: concepts/orchestration-graph.md
      - Memory Tiers: concepts/memory-tiers.md
      - Durability and Replay: concepts/durability-and-replay.md
      - Determinism: concepts/determinism.md
      - Human-in-the-Loop: concepts/human-in-the-loop.md
      - Observability and OTEL: concepts/observability-and-otel.md
      - Providers and Local-First: concepts/providers-and-local-first.md
      - Vector Stores: concepts/vector-stores.md
      - Policy and Data Sovereignty: concepts/policy-and-data-sovereignty.md
      - MCP and A2A Interop: concepts/mcp-and-a2a.md
      - Deployment Models: concepts/deployment-models.md
      - Glossary: concepts/glossary.md
  - Language SDKs:
      - Go: sdk/go/index.md
      - Python: sdk/python/index.md
      - TypeScript: sdk/ts/index.md
      - .NET: sdk/dotnet/index.md
      - Java: sdk/java/index.md
      - Rust: sdk/rust/index.md
  - Quickstarts: quickstarts/index.md
  - Guides: guides/index.md
  - Contributing: CONTRIBUTING.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
