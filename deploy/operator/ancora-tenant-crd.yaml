apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ancoratenants.ancora.io
spec:
  group: ancora.io
  names:
    kind: AncoraTenant
    listKind: AncoraTenantList
    plural: ancoratenants
    singular: ancoratenant
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [clusterRef, maxWorkers]
              properties:
                clusterRef:
                  type: string
                maxWorkers:
                  type: integer
                  minimum: 1
                providerAllowlist:
                  type: array
                  items:
                    type: string
                residencyRegion:
                  type: string
                adminRoleBinding:
                  type: string
