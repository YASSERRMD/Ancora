name: ancora-keymgmt
on:
  push:
    paths: ['crates/ancora-keymgmt/**', 'docs/keymgmt/**', '.github/workflows/keymgmt.yml']
  pull_request:
    paths: ['crates/ancora-keymgmt/**', 'docs/keymgmt/**', '.github/workflows/keymgmt.yml']
env:
  CARGO_TERM_COLOR: always
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p ancora-keymgmt
      - name: Assert minimum test count
        run: |
          count=$(cargo test -p ancora-keymgmt 2>&1 | grep -c "^test .* ok$" || true)
          test "$count" -ge 30
      - name: No em dashes
        run: '! grep -r $'\''\xe2\x80\x94'\'' crates/ancora-keymgmt/ docs/keymgmt/ && echo ok'
      - name: Docs present
        run: test -f docs/keymgmt/reference.md
