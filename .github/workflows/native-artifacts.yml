name: native-artifacts

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-native:
    name: Build native libs
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-aarch64
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Extract crate version
        id: version
        run: echo "version=$(cargo metadata --no-deps --format-version 1 | python3 -c \"import sys,json; pkgs=json.load(sys.stdin)['packages']; print([p['version'] for p in pkgs if p['name']=='ancora-ffi'][0])\")" >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Install cross (arm64 linux only)
        if: matrix.use_cross == true
        run: cargo install cross --locked
      - name: Build cdylib
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release -p ancora-ffi --target ${{ matrix.target }}
          else
            cargo build --release -p ancora-ffi --target ${{ matrix.target }}
          fi
        shell: bash
      - name: Generate C header via cbindgen
        if: matrix.use_cross != true
        run: cargo build -p ancora-ffi --target ${{ matrix.target }}
      - name: Upload staticlib artifact
        uses: actions/upload-artifact@v4
        with:
          name: ancora-staticlib-${{ matrix.artifact_suffix }}-${{ steps.version.outputs.version }}
          path: |
            target/${{ matrix.target }}/release/libancora_ffi.a
            target/${{ matrix.target }}/release/ancora_ffi.lib
          if-no-files-found: ignore
      - name: Upload cdylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: ancora-ffi-${{ matrix.artifact_suffix }}-${{ steps.version.outputs.version }}
          path: |
            target/${{ matrix.target }}/release/libancora_ffi.so
            target/${{ matrix.target }}/release/libancora_ffi.dylib
            target/${{ matrix.target }}/release/ancora_ffi.dll
          if-no-files-found: ignore
      - name: Upload C header artifact
        if: matrix.use_cross != true
        uses: actions/upload-artifact@v4
        with:
          name: ancora-header-${{ matrix.artifact_suffix }}-${{ steps.version.outputs.version }}
          path: target/${{ matrix.target }}/release/build/ancora-ffi-*/out/ancora.h
          if-no-files-found: ignore
