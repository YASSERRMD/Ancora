name: java-ci

on:
  push:
    paths:
      - "sdk/java/**"
      - "crates/ancora-ffi/**"
      - ".github/workflows/java-ci.yml"
  pull_request:
    paths:
      - "sdk/java/**"
      - "crates/ancora-ffi/**"
      - ".github/workflows/java-ci.yml"

jobs:
  test:
    name: Java build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build ancora-ffi cdylib
        run: cargo build -p ancora-ffi --release
        env:
          CARGO_TERM_COLOR: always

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Run tests
        working-directory: sdk/java
        run: gradle test
        env:
          ANCORA_NATIVE_LIB_PATH: "${{ github.workspace }}/target/release"

  publish-dry-run:
    name: Maven publish (dry run)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Publish to local repository
        working-directory: sdk/java
        run: gradle publishMavenJavaPublicationToLocalRepository

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ancora-java-sdk-jar
          path: sdk/java/build/repo/**/*.jar
