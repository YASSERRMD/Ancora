name: ancora-secboot
on:
  push:
    paths: ['crates/ancora-secboot/**', 'docs/secboot/**', '.github/workflows/secboot.yml']
  pull_request:
    paths: ['crates/ancora-secboot/**', 'docs/secboot/**', '.github/workflows/secboot.yml']
env:
  CARGO_TERM_COLOR: always
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p ancora-secboot
      - name: Assert minimum test count
        run: |
          count=$(cargo test -p ancora-secboot 2>&1 | grep -c "^test .* ok$" || true)
          test "$count" -ge 30
      - name: No em dashes
        run: '! grep -r $'\''\xe2\x80\x94'\'' crates/ancora-secboot/ docs/secboot/ && echo ok'
      - name: Docs present
        run: test -f docs/secboot/reference.md
