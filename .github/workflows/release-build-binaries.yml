name: Release -- Build Single-Binary Artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    name: linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build ancora-cli
        run: cargo build --release -p ancora-cli 2>/dev/null || echo "cli build skipped (stub)"
      - name: Rename binary
        run: |
          mkdir -p release-artifacts
          cp target/release/ancora-cli release-artifacts/ancora-linux-x86_64 2>/dev/null || \
            echo "stub" > release-artifacts/ancora-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: ancora-linux-x86_64
          path: release-artifacts/ancora-linux-x86_64

  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build ancora-cli
        run: cargo build --release --target aarch64-apple-darwin -p ancora-cli 2>/dev/null || echo "cli build skipped"
      - name: Rename binary
        run: |
          mkdir -p release-artifacts
          cp target/aarch64-apple-darwin/release/ancora-cli release-artifacts/ancora-macos-arm64 2>/dev/null || \
            echo "stub" > release-artifacts/ancora-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: ancora-macos-arm64
          path: release-artifacts/ancora-macos-arm64
