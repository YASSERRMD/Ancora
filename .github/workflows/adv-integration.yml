name: advanced-integration

on:
  push:
    branches: [main]
    paths:
      - 'crates/ancora-adv-integration/**'
      - 'crates/ancora-orchestrate/**'
      - 'crates/ancora-memcon/**'
      - 'crates/ancora-toolsynth/**'
      - 'crates/ancora-skills/**'
      - 'crates/ancora-lh/**'
      - 'crates/ancora-coord/**'
      - 'crates/ancora-guard/**'
      - 'crates/ancora-reason/**'
      - 'crates/ancora-ageval/**'
  pull_request:
    paths:
      - 'crates/ancora-adv-integration/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  advanced-integration:
    name: Advanced capability integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-adv-integration-${{ hashFiles('**/Cargo.lock') }}

      - name: Build ancora-adv-integration
        run: cargo build -p ancora-adv-integration

      - name: Run advanced integration tests
        run: cargo test -p ancora-adv-integration -- --nocapture

      - name: Run advanced combined example
        run: cargo test -p ancora-examples advanced_combined -- --nocapture
