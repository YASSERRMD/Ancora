name: ancora-compliance
on:
  push:
    paths: ['crates/ancora-compliance/**', 'docs/compliance/**', '.github/workflows/compliance.yml']
  pull_request:
    paths: ['crates/ancora-compliance/**', 'docs/compliance/**', '.github/workflows/compliance.yml']
env:
  CARGO_TERM_COLOR: always
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p ancora-compliance
      - name: Assert minimum test count
        run: |
          count=$(cargo test -p ancora-compliance 2>&1 | grep -c "^test .* ok$" || true)
          test "$count" -ge 30
      - name: No em dashes
        run: '! grep -r $'\''\xe2\x80\x94'\'' crates/ancora-compliance/ docs/compliance/ && echo ok'
      - name: Docs present
        run: test -f docs/compliance/reference.md
