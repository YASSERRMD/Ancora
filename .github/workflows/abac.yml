name: ancora-abac
on:
  push:
    paths: ['crates/ancora-abac/**', 'docs/abac/**', '.github/workflows/abac.yml']
  pull_request:
    paths: ['crates/ancora-abac/**', 'docs/abac/**', '.github/workflows/abac.yml']
env:
  CARGO_TERM_COLOR: always
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p ancora-abac
      - name: Assert minimum test count
        run: |
          count=$(cargo test -p ancora-abac 2>&1 | grep -c "^test .* ok$" || true)
          test "$count" -ge 30
      - name: No em dashes
        run: '! grep -r $'\''\xe2\x80\x94'\'' crates/ancora-abac/ docs/abac/ && echo ok'
      - name: Docs present
        run: test -f docs/abac/abac-guide.md
