name: dotnet-native-pack

on:
  workflow_call: {}

jobs:
  pack-native:
    name: Build native lib for pack (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rid: linux-x64
            lib_name: libancora_ffi.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            rid: linux-arm64
            lib_name: libancora_ffi.so
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            rid: osx-x64
            lib_name: libancora_ffi.dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            rid: osx-arm64
            lib_name: libancora_ffi.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rid: win-x64
            lib_name: ancora_ffi.dll
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            rid: win-arm64
            lib_name: ancora_ffi.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (arm64 linux only)
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build native library
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release -p ancora-ffi --target ${{ matrix.target }}
          else
            cargo build --release -p ancora-ffi --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Upload native library artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-native-${{ matrix.rid }}
          path: target/${{ matrix.target }}/release/${{ matrix.lib_name }}
          if-no-files-found: error

  pack:
    name: NuGet pack
    runs-on: ubuntu-latest
    needs: pack-native
    steps:
      - uses: actions/checkout@v4

      - name: Download all native library artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dotnet-native-*
          path: /tmp/dotnet-native

      - name: Arrange native libraries into build/native/<rid>/
        run: |
          for dir in /tmp/dotnet-native/dotnet-native-*; do
            rid="$(basename "$dir" | sed 's/^dotnet-native-//')"
            mkdir -p "sdk/dotnet/Ancora/build/native/${rid}"
            cp "$dir"/* "sdk/dotnet/Ancora/build/native/${rid}/"
          done
          find sdk/dotnet/Ancora/build/native -type f

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Pack NuGet
        working-directory: sdk/dotnet/Ancora
        run: dotnet pack --configuration Release --output ./nupkgs

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: |
            sdk/dotnet/Ancora/nupkgs/*.nupkg
            sdk/dotnet/Ancora/nupkgs/*.snupkg

  verify-local-install:
    name: Verify local feed install (clean project)
    runs-on: ubuntu-latest
    needs: pack
    steps:
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download NuGet artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: /tmp/local-nuget-feed

      - name: Create a clean console project with no reference to this repo
        run: dotnet new console -o /tmp/clean-consumer

      - name: Install Ancora.Agent from the local feed only
        working-directory: /tmp/clean-consumer
        run: dotnet add package Ancora.Agent --source /tmp/local-nuget-feed

      - name: Write a minimal offline-agent program
        run: |
          cat > /tmp/clean-consumer/Program.cs <<'EOF'
          using Ancora;

          using var agent = new Agent();
          var handle = agent.Run(new AgentSpec(Model: "mock", Instructions: "hello from a clean nuget install"));
          var events = await handle.CollectAsync();

          var completed = events.OfType<CompletedEvent>().FirstOrDefault();
          if (completed is null)
          {
              Console.Error.WriteLine("clean install failed: no completed event");
              Environment.Exit(1);
          }

          Console.WriteLine($"Clean install works. Output: {completed.Output}");
          EOF

      - name: Run the clean consumer project
        working-directory: /tmp/clean-consumer
        run: dotnet run
