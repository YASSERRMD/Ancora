name: ancora-netpol
on:
  push:
    paths: ['crates/ancora-netpol/**', 'docs/netpol/**', '.github/workflows/netpol.yml']
  pull_request:
    paths: ['crates/ancora-netpol/**', 'docs/netpol/**', '.github/workflows/netpol.yml']
env:
  CARGO_TERM_COLOR: always
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p ancora-netpol
      - name: Assert minimum test count
        run: |
          count=$(cargo test -p ancora-netpol 2>&1 | grep -c "^test .* ok$" || true)
          test "$count" -ge 40
      - name: No em dashes
        run: '! grep -r $'\''\xe2\x80\x94'\'' crates/ancora-netpol/ docs/netpol/ && echo ok'
      - name: Docs present
        run: test -f docs/netpol/reference.md
