name: xlang-conformance-ci

on:
  push:
    paths:
      - "crates/ancora-core/tests/xlang_*"
      - "sdk/go/ancora/xlang_*"
      - "sdk/python/tests/test_xlang_*"
      - "sdk/ts/__tests__/xlang-*"
      - "sdk/dotnet/Ancora.Tests/Xlang*"
      - "sdk/java/src/test/java/io/ancora/Phase152*"
      - ".github/workflows/xlang-conformance-ci.yml"
  pull_request:
    paths:
      - "crates/ancora-core/tests/xlang_*"
      - "sdk/go/ancora/xlang_*"
      - "sdk/python/tests/test_xlang_*"
      - "sdk/ts/__tests__/xlang-*"
      - "sdk/dotnet/Ancora.Tests/Xlang*"
      - "sdk/java/src/test/java/io/ancora/Phase152*"
      - ".github/workflows/xlang-conformance-ci.yml"

jobs:
  rust:
    name: Rust xlang conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust xlang tests
        run: |
          cargo test --test xlang_single_agent_rust
          cargo test --test xlang_verifier_rust
          cargo test --test xlang_humaninloop_rust
          cargo test --test xlang_journal_equality
          cargo test --test xlang_mcp_rust_python
          cargo test --test xlang_a2a_identity
          cargo test --test xlang_shared_fixture
          cargo test --test xlang_cost_parity
          cargo test --test xlang_otel_parity

  go:
    name: Go xlang conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: sdk/go/go.sum
      - name: Run Go xlang tests
        working-directory: sdk/go
        run: go test ./ancora/... -run "TestXlang|TestA2A|TestMcp" -count=1

  python:
    name: Python xlang conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: sdk/python
        run: pip install pytest
      - name: Run Python xlang tests
        working-directory: sdk/python
        run: pytest tests/test_xlang_*.py -v

  typescript:
    name: TypeScript xlang conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: sdk/ts
        run: npm ci
      - name: Run TS xlang tests
        working-directory: sdk/ts
        run: npx jest --testPathPattern="xlang" --passWithNoTests

  dotnet:
    name: .NET xlang conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Run .NET xlang tests
        working-directory: sdk/dotnet
        run: dotnet test --filter "FullyQualifiedName~Xlang" --no-build --verbosity normal || dotnet test --filter "FullyQualifiedName~Xlang" --verbosity normal

  java:
    name: Java xlang conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Run Java xlang tests
        working-directory: sdk/java
        run: ./gradlew test --tests "io.ancora.Phase152*" --no-daemon
