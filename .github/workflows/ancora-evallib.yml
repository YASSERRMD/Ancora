name: ancora-evallib

on:
  push:
    paths:
      - 'crates/ancora-evallib/**'
      - '.github/workflows/ancora-evallib.yml'
  pull_request:
    paths:
      - 'crates/ancora-evallib/**'
      - '.github/workflows/ancora-evallib.yml'

jobs:
  smoke:
    name: Eval library smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-evallib-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-evallib-

      - name: Build ancora-evallib
        run: cargo build -p ancora-evallib

      - name: Run ancora-evallib tests
        run: cargo test -p ancora-evallib
