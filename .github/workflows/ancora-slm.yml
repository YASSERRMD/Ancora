name: ancora-slm

on:
  push:
    paths:
      - 'crates/ancora-slm/**'
      - '.github/workflows/ancora-slm.yml'
  pull_request:
    paths:
      - 'crates/ancora-slm/**'
      - '.github/workflows/ancora-slm.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test ancora-slm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-slm-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check
        run: cargo check -p ancora-slm

      - name: cargo test
        run: cargo test -p ancora-slm --all-features

      - name: cargo test example (offline)
        run: cargo test -p ancora-slm --example slm_first
