name: py-publish

on:
  release:
    types: [published]

jobs:
  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    needs:
      []
    steps:
      - uses: actions/checkout@v4

      - name: download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: py-wheel-*
          path: dist/
          merge-multiple: true

      - name: download sdist
        uses: actions/download-artifact@v4
        with:
          name: py-sdist
          path: dist/

      - name: publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
