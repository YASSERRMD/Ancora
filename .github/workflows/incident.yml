name: ancora-incident

on:
  push:
    paths:
      - 'crates/ancora-incident/**'
      - '.github/workflows/incident.yml'
  pull_request:
    paths:
      - 'crates/ancora-incident/**'
      - '.github/workflows/incident.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check for em-dash
        run: |
          if grep -r $'\xe2\x80\x94' crates/ancora-incident/; then
            echo "em-dash found" && exit 1
          fi
      - name: Build
        run: cargo build -p ancora-incident
      - name: Test
        run: cargo test -p ancora-incident -- --test-threads=1
      - name: Count tests
        run: |
          COUNT=$(cargo test -p ancora-incident -- --list 2>/dev/null | grep -c ': test$' || true)
          echo "Test count: $COUNT"
          if [ "$COUNT" -lt 30 ]; then echo "Need at least 30 tests, got $COUNT" && exit 1; fi
      - name: Example
        run: cargo run -p ancora-incident --example basic_incident
