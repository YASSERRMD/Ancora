name: Publish -- NuGet

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  pack:
    name: NuGet pack (all platforms)
    uses: ./.github/workflows/dotnet-native-pack.yml

  verify-version:
    name: Verify package version matches the release tag
    runs-on: ubuntu-latest
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Verify package version matches the release tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' sdk/dotnet/Ancora/Ancora.csproj)
          if [ "$TAG_VERSION" != "$CSPROJ_VERSION" ]; then
            echo "::error::tag v$TAG_VERSION does not match Ancora.csproj Version $CSPROJ_VERSION"
            exit 1
          fi
          echo "tag version $TAG_VERSION matches csproj version $CSPROJ_VERSION"

  publish:
    name: Push package to nuget.org
    runs-on: ubuntu-latest
    needs: verify-version
    if: startsWith(github.ref, 'refs/tags/v')
    environment: nuget-publish
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download NuGet artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: /tmp/nuget-release

      # Trusted Publishing: exchange this run's GitHub OIDC token for a
      # nuget.org API key that is scoped to this repo/workflow/environment
      # and expires in about an hour, instead of storing a long-lived key.
      # Configure the matching policy at nuget.org under Trusted Publishing:
      # repository owner YASSERRMD, repository Ancora, workflow file
      # publish-nuget.yml, environment nuget-publish.
      - name: NuGet login (OIDC to temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        working-directory: /tmp/nuget-release
        run: |
          dotnet nuget push "*.nupkg" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # --skip-duplicate makes dotnet nuget push exit 0 even when nuget.org
      # rejected the package (for example a reserved-id-prefix error, which
      # a 2026-07-15 release attempt hit and only surfaced through a manual
      # web upload, not this job). Confirm the version is actually queryable
      # before calling the release a success.
      - name: Verify the package is actually live on nuget.org
        run: |
          PACKAGE_ID=$(grep -oP '(?<=<PackageId>)[^<]+' sdk/dotnet/Ancora/Ancora.csproj | tr '[:upper:]' '[:lower:]')
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' sdk/dotnet/Ancora/Ancora.csproj)
          URL="https://api.nuget.org/v3-flatcontainer/${PACKAGE_ID}/${VERSION}/${PACKAGE_ID}.${VERSION}.nupkg"
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "confirmed: $PACKAGE_ID $VERSION is live at $URL"
              exit 0
            fi
            echo "attempt $i: $URL returned $STATUS, retrying in 15s"
            sleep 15
          done
          echo "::error::$PACKAGE_ID $VERSION never became queryable on nuget.org after the push reported success"
          exit 1
