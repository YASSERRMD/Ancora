name: Publish -- NuGet

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  pack:
    name: NuGet pack (all platforms)
    uses: ./.github/workflows/dotnet-native-pack.yml

  verify-version:
    name: Verify package version matches the release tag
    runs-on: ubuntu-latest
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Verify package version matches the release tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' sdk/dotnet/Ancora/Ancora.csproj)
          if [ "$TAG_VERSION" != "$CSPROJ_VERSION" ]; then
            echo "::error::tag v$TAG_VERSION does not match Ancora.csproj Version $CSPROJ_VERSION"
            exit 1
          fi
          echo "tag version $TAG_VERSION matches csproj version $CSPROJ_VERSION"

  publish:
    name: Push package to nuget.org
    runs-on: ubuntu-latest
    needs: verify-version
    if: startsWith(github.ref, 'refs/tags/v')
    environment: nuget-publish
    steps:
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download NuGet artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: /tmp/nuget-release

      - name: Push to nuget.org
        working-directory: /tmp/nuget-release
        run: |
          dotnet nuget push "*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
