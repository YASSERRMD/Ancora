name: ancora-secrets
on:
  push:
    paths: ['crates/ancora-secrets/**', 'docs/secrets/**', '.github/workflows/secrets.yml']
  pull_request:
    paths: ['crates/ancora-secrets/**', 'docs/secrets/**', '.github/workflows/secrets.yml']
env:
  CARGO_TERM_COLOR: always
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p ancora-secrets
      - name: Assert minimum test count
        run: |
          count=$(cargo test -p ancora-secrets 2>&1 | grep -c "^test .* ok$" || true)
          test "$count" -ge 45
      - name: No em dashes
        run: '! grep -r $'\''\xe2\x80\x94'\'' crates/ancora-secrets/ docs/secrets/ && echo ok'
      - name: Docs present
        run: test -f docs/secrets/secrets-guide.md
