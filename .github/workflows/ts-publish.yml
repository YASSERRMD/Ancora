name: ts-publish

on:
  push:
    tags:
      - 'sdk-ts-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run publish (no actual publish to npm)'
        required: false
        default: 'true'
        type: boolean

jobs:
  build-native:
    name: Build native addon (${{ matrix.settings.name }})
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: linux-x64-gnu
            host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: darwin-x64
            host: macos-latest
            target: x86_64-apple-darwin
          - name: darwin-arm64
            host: macos-latest
            target: aarch64-apple-darwin
          - name: win32-x64-msvc
            host: windows-latest
            target: x86_64-pc-windows-msvc
          - name: linux-arm64-gnu
            host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ts-publish-${{ matrix.settings.target }}
      - name: Install cross-compilation tools (linux-arm64)
        if: matrix.settings.name == 'linux-arm64-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Install npm deps
        working-directory: sdk/ts
        run: npm ci
      - name: Build native addon
        working-directory: sdk/ts
        run: npx napi build --platform --release --target ${{ matrix.settings.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Copy .node to platform package directory
        shell: bash
        run: |
          ARTIFACT=$(ls sdk/ts/ancora.*.node)
          cp "$ARTIFACT" "sdk/ts/npm/${{ matrix.settings.name }}/"
      - name: Upload artifact for publish job
        uses: actions/upload-artifact@v4
        with:
          name: ts-publish-${{ matrix.settings.name }}
          path: sdk/ts/npm/${{ matrix.settings.name }}/ancora.*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build-native]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install npm deps
        working-directory: sdk/ts
        run: npm ci
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ts-publish-*
          path: sdk/ts/npm
          merge-multiple: false
      - name: Compile TypeScript
        working-directory: sdk/ts
        run: npx tsc --noEmit
      - name: Publish (dry-run)
        if: github.event.inputs.dry_run == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: sdk/ts
        run: npm publish --dry-run
      - name: Publish
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        working-directory: sdk/ts
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
