name: dotnet-ci

on:
  push:
    paths:
      - "sdk/dotnet/**"
      - "crates/ancora-ffi/**"
      - ".github/workflows/dotnet-ci.yml"
  pull_request:
    paths:
      - "sdk/dotnet/**"
      - "crates/ancora-ffi/**"
      - ".github/workflows/dotnet-ci.yml"

jobs:
  test:
    name: .NET build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build ancora-ffi cdylib
        run: cargo build -p ancora-ffi --release
        env:
          CARGO_TERM_COLOR: always

      - name: Copy native library for tests
        run: |
          cp target/release/libancora_ffi.so sdk/dotnet/Ancora.Tests/libancora_ffi.so

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore packages
        working-directory: sdk/dotnet
        run: dotnet restore

      - name: Build
        working-directory: sdk/dotnet
        run: dotnet build --no-restore --configuration Release

      - name: Run tests with coverage
        working-directory: sdk/dotnet
        run: |
          dotnet test --no-build --configuration Release --verbosity normal \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
        env:
          LD_LIBRARY_PATH: "${{ github.workspace }}/sdk/dotnet/Ancora.Tests"

      - name: Enforce coverage threshold
        working-directory: sdk/dotnet
        run: |
          COVER_MIN=60
          REPORT=$(find . -name "coverage.cobertura.xml" | head -1)
          if [ -z "$REPORT" ]; then
            echo "No coverage report found; skipping threshold check."
            exit 0
          fi
          LINE_RATE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$REPORT')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', '0'))
          print(int(rate * 100))
          ")
          echo "Line coverage: ${LINE_RATE}%"
          if [ "$LINE_RATE" -lt "$COVER_MIN" ]; then
            echo "Coverage ${LINE_RATE}% is below threshold ${COVER_MIN}%"
            exit 1
          fi
          echo "Coverage ${LINE_RATE}% meets threshold ${COVER_MIN}%"

  pack-native:
    name: Build native lib for pack (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rid: linux-x64
            lib_name: libancora_ffi.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            rid: linux-arm64
            lib_name: libancora_ffi.so
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            rid: osx-x64
            lib_name: libancora_ffi.dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            rid: osx-arm64
            lib_name: libancora_ffi.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rid: win-x64
            lib_name: ancora_ffi.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (arm64 linux only)
        if: matrix.use_cross == true
        run: cargo install cross --locked

      - name: Build native library
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release -p ancora-ffi --target ${{ matrix.target }}
          else
            cargo build --release -p ancora-ffi --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Upload native library artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-native-${{ matrix.rid }}
          path: target/${{ matrix.target }}/release/${{ matrix.lib_name }}
          if-no-files-found: error

  pack:
    name: NuGet pack (dry run)
    runs-on: ubuntu-latest
    needs: [test, pack-native]
    steps:
      - uses: actions/checkout@v4

      - name: Download all native library artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dotnet-native-*
          path: /tmp/dotnet-native

      - name: Arrange native libraries into build/native/<rid>/
        run: |
          for dir in /tmp/dotnet-native/dotnet-native-*; do
            rid="$(basename "$dir" | sed 's/^dotnet-native-//')"
            mkdir -p "sdk/dotnet/Ancora/build/native/${rid}"
            cp "$dir"/* "sdk/dotnet/Ancora/build/native/${rid}/"
          done
          find sdk/dotnet/Ancora/build/native -type f

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Pack NuGet
        working-directory: sdk/dotnet/Ancora
        run: dotnet pack --configuration Release --output ./nupkgs

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: |
            sdk/dotnet/Ancora/nupkgs/*.nupkg
            sdk/dotnet/Ancora/nupkgs/*.snupkg
