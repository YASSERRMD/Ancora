name: Publish Dry Run -- NuGet

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  dry-run-nuget:
    name: NuGet pack dry run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build native library (linux-x64)
        run: |
          cargo build --release -p ancora-ffi --target x86_64-unknown-linux-gnu
          mkdir -p sdk/dotnet/Ancora/build/native/linux-x64
          cp target/x86_64-unknown-linux-gnu/release/libancora_ffi.so \
             sdk/dotnet/Ancora/build/native/linux-x64/libancora_ffi.so

      - name: Pack the real Ancora project
        working-directory: sdk/dotnet/Ancora
        run: dotnet pack --configuration Release --output ./nupkgs

      - name: Verify package version matches the release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CSPROJ_VERSION=$(grep -oP '(?<=<Version>)[^<]+' sdk/dotnet/Ancora/Ancora.csproj)
          if [ "$TAG_VERSION" != "$CSPROJ_VERSION" ]; then
            echo "::error::tag v$TAG_VERSION does not match Ancora.csproj Version $CSPROJ_VERSION"
            exit 1
          fi
          echo "tag version $TAG_VERSION matches csproj version $CSPROJ_VERSION"

      - name: Upload dry-run package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-dry-run-package
          path: |
            sdk/dotnet/Ancora/nupkgs/*.nupkg
            sdk/dotnet/Ancora/nupkgs/*.snupkg
