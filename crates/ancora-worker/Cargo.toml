[package]
name = "ancora-worker"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Stateless worker pool for Ancora: lease-based claim, execution, and recovery"

[dependencies]
ancora-controlplane = { path = "../ancora-controlplane" }
ancora-core = { path = "../ancora-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
