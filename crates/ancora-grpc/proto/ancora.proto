syntax = "proto3";

package ancora;

service RunService {
  rpc StartRun(StartRunRequest) returns (StartRunResponse);
  rpc PollRun(PollRunRequest) returns (PollRunResponse);
  rpc ResumeRun(ResumeRunRequest) returns (ResumeRunResponse);
  rpc StreamEvents(StreamEventsRequest) returns (stream EventResponse);
  rpc DecisionStream(stream DecisionRequest) returns (stream EventResponse);
}

message StartRunRequest {
  bytes agent_spec = 1;
}

message StartRunResponse {
  string run_id = 1;
}

message PollRunRequest {
  string run_id = 1;
}

message PollRunResponse {
  string event = 1;
}

message ResumeRunRequest {
  string run_id = 1;
  bytes decision = 2;
}

message ResumeRunResponse {
  string status = 1;
}

message StreamEventsRequest {
  string run_id = 1;
}

message EventResponse {
  string event = 1;
}

message DecisionRequest {
  string run_id = 1;
  bytes decision = 2;
}
