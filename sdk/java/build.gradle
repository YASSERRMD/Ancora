plugins {
    id 'java-library'
    id 'maven-publish'
    id 'jacoco'
}

group = 'io.ancora'
version = '0.1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(22)
    }
}

repositories {
    mavenCentral()
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs << '-parameters'
}

dependencies {
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'
    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
    // Required for FFM API access in unnamed module context.
    jvmArgs '--enable-native-access=ALL-UNNAMED'
    // Pass library path from environment if set.
    systemProperty 'java.library.path',
        System.getenv('ANCORA_NATIVE_LIB_PATH') ?: System.getProperty('java.library.path') ?: ''
    finalizedBy jacocoTestReport
}

jacoco {
    toolVersion = '0.8.12'
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = false
    }
}

jar {
    manifest {
        attributes(
            'Implementation-Title': 'Ancora Java SDK',
            'Implementation-Version': version,
        )
    }
}

java {
    withSourcesJar()
    withJavadocJar()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            groupId = group
            artifactId = 'ancora-java-sdk'
            version = project.version

            pom {
                name = 'Ancora Java SDK'
                description = 'Java bindings for the Ancora agentic runtime'
                licenses {
                    license {
                        name = 'MIT'
                    }
                }
            }
        }
    }
    repositories {
        maven {
            name = 'local'
            url = layout.buildDirectory.dir('repo')
        }
    }
}
