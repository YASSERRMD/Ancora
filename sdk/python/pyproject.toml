[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "ancora"
version = "0.1.0"
description = "Python SDK for the Ancora agent runtime"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "YASSERRMD", email = "arafath.yasser@gmail.com" }]
requires-python = ">=3.9"
dependencies = ["pydantic>=2.0"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Rust",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Topic :: Software Development :: Libraries",
]

[project.optional-dependencies]
test = ["pytest>=7", "pytest-asyncio>=0.21"]

[tool.maturin]
manifest-path = "../../crates/ancora-py/Cargo.toml"
module-name = "ancora._ancora"
python-source = "."
features = ["pyo3/extension-module"]
strip = true
profile = "release"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
